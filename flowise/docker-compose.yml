services:
  flowise:
    image: flowiseai/flowise:3.1.3
    container_name: flowise
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3002:3000"

    volumes:
      - ../../data/flowise:/root/.flowise

    networks:
      - lab-network

networks:
  lab-network:
    external: true
