services:
  # Un solo uso: crea/actualiza el esquema SQL de Temporal en el Postgres
  # compartido (bases "temporal" y "temporal_visibility", ya creadas por
  # docker/postgres/init/). Termina y queda "Exited (0)" - es esperado.
  temporal-admin-tools:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-admin-tools
    restart: on-failure:6
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh
    networks:
      - lab-network

  temporal:
    image: temporalio/server:1.31.0
    container_name: temporal
    restart: unless-stopped
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    networks:
      - lab-network

  # Un solo uso: crea el namespace "default" la primera vez. Es idempotente
  # (si ya existe, no hace nada) - queda "Exited (0)" luego de correr.
  temporal-create-namespace:
    image: temporalio/admin-tools:1.31.0
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=default
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh
    networks:
      - lab-network

  temporal-ui:
    image: temporalio/ui:2.49.1
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8083,http://100.70.250.3:8083
    ports:
      - "8083:8080"
    networks:
      - lab-network

networks:
  lab-network:
    external: true
