services:
  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8081:80"

    volumes:
      - ../../data/vaultwarden:/data

    networks:
      - lab-network

networks:
  lab-network:
    external: true
