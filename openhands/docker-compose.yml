services:
  openhands:
    image: ghcr.io/all-hands-ai/openhands@sha256:00968de77a7b36546413e1f3b5c6b4e2c387d19ade54de7926e10f5b3d265fa6
    container_name: openhands
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3009:3000"

    # Necesario para que OpenHands pueda levantar sus propios contenedores
    # "sandbox" (donde el agente ejecuta codigo). Le da control sobre el
    # Docker del host: es inherente a como funciona la herramienta, no una
    # opcion. No exponer este servicio fuera de la red interna/Tailscale.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../data/openhands/state:/.openhands
      - ../../data/openhands/workspace:/opt/workspace_base

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - lab-network

networks:
  lab-network:
    external: true
