services:
  portainer:
    image: portainer/portainer-ce:2.43.0
    container_name: portainer
    restart: unless-stopped

    ports:
      - "9000:9000"
      - "9443:9443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../data/portainer:/data

    networks:
      - lab-network

networks:
  lab-network:
    external: true
