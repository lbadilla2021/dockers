x-shared:
  app-environment: &app-environment
    WEBAPP_URL: ${WEBAPP_URL}
    NEXTAUTH_URL: ${WEBAPP_URL}
    DATABASE_URL: ${DATABASE_URL}
    NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    CRON_SECRET: ${CRON_SECRET}
    REDIS_URL: ${REDIS_URL}
    HUB_API_KEY: ${HUB_API_KEY}
    HUB_API_URL: ${HUB_API_URL}
    CUBEJS_API_URL: ${CUBEJS_API_URL}
    CUBEJS_API_SECRET: ${CUBEJS_API_SECRET}
    CUBEJS_JWT_ISSUER: formbricks-web
    CUBEJS_JWT_AUDIENCE: formbricks-cube
    EMAIL_VERIFICATION_DISABLED: 1
    PASSWORD_RESET_DISABLED: 1
    TAXONOMY_SERVICE_URL: ""
    TAXONOMY_SERVICE_TOKEN: ""
    HUB_INTERNAL_API_TOKEN: ""

services:
  formbricks-postgres:
    image: pgvector/pgvector:pg18
    container_name: formbricks-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=formbricks
    volumes:
      - ../../data/formbricks/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks:
      - lab-network

  formbricks-redis:
    image: valkey/valkey@sha256:12ba4f45a7c3e1d0f076acd616cb230834e75a77e8516dde382720af32832d6d
    container_name: formbricks-redis
    restart: unless-stopped
    command: valkey-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - ../../data/formbricks/redis:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - lab-network

  formbricks-migrate:
    image: ghcr.io/formbricks/formbricks:5.1.4
    container_name: formbricks-migrate
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - 'if command -v timeout >/dev/null 2>&1; then timeout 300 node packages/database/dist/scripts/apply-migrations.js; else node packages/database/dist/scripts/apply-migrations.js; fi'
    environment:
      <<: *app-environment
    depends_on:
      formbricks-postgres:
        condition: service_healthy
    networks:
      - lab-network

  formbricks-hub-migrate:
    image: ghcr.io/formbricks/hub:0.8.1
    container_name: formbricks-hub-migrate
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - 'if [ -x /usr/local/bin/goose ] && [ -x /usr/local/bin/river ]; then /usr/local/bin/goose -dir /app/migrations postgres "$$DATABASE_URL" up && /usr/local/bin/river migrate-up --database-url "$$DATABASE_URL"; else echo "Migration tools (goose/river) not in image."; exit 1; fi'
    environment:
      DATABASE_URL: ${HUB_DATABASE_URL}
    depends_on:
      formbricks-migrate:
        condition: service_completed_successfully
    networks:
      - lab-network

  formbricks-hub:
    image: ghcr.io/formbricks/hub:0.8.1
    container_name: formbricks-hub
    restart: unless-stopped
    environment:
      API_KEY: ${HUB_API_KEY}
      DATABASE_URL: ${HUB_DATABASE_URL}
      TAXONOMY_SERVICE_URL: ""
      TAXONOMY_SERVICE_TOKEN: ""
      HUB_INTERNAL_API_TOKEN: ""
    depends_on:
      formbricks-hub-migrate:
        condition: service_completed_successfully
      formbricks-postgres:
        condition: service_healthy
    networks:
      - lab-network

  formbricks-cube:
    image: cubejs/cube:v1.6.6
    container_name: formbricks-cube
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        if [ -z "$$CUBEJS_API_SECRET" ]; then
          echo "CUBEJS_API_SECRET is required for Cube JWT authentication" >&2
          exit 1
        fi
        exec cubejs server
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: formbricks-postgres
      CUBEJS_DB_NAME: formbricks
      CUBEJS_DB_USER: postgres
      CUBEJS_DB_PASS: ${POSTGRES_PASSWORD}
      CUBEJS_DB_PORT: 5432
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET}
      CUBEJS_JWT_ISSUER: formbricks-web
      CUBEJS_JWT_AUDIENCE: formbricks-cube
      CUBEJS_DEFAULT_API_SCOPES: meta,data
      CUBEJS_CACHE_AND_QUEUE_DRIVER: memory
    volumes:
      - ./cube/cube.js:/cube/conf/cube.js:ro
      - ./cube/schema:/cube/conf/model:ro
    depends_on:
      formbricks-hub-migrate:
        condition: service_completed_successfully
      formbricks-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/readyz', (res) => { res.resume(); process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - lab-network

  formbricks:
    image: ghcr.io/formbricks/formbricks:5.1.4
    container_name: formbricks
    restart: unless-stopped
    ports:
      - "3006:3000"
    environment:
      <<: *app-environment
      SKIP_STARTUP_MIGRATION: "true"
    depends_on:
      formbricks-postgres:
        condition: service_healthy
      formbricks-redis:
        condition: service_healthy
      formbricks-cube:
        condition: service_healthy
    networks:
      - lab-network

networks:
  lab-network:
    external: true
