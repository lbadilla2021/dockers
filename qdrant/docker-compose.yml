services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ../../data/qdrant:/qdrant/storage

    networks:
      - lab-network

networks:
  lab-network:
    external: true
