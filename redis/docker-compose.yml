services:
  redis:
    image: redis:8.8.0
    container_name: redis
    restart: unless-stopped

    env_file:
      - .env

    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]

    ports:
      - "6379:6379"

    volumes:
      - ../../data/redis:/data

    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - lab-network

networks:
  lab-network:
    external: true
